# /etc/nginx/conf.d/waf.conf
# Lightweight "WAF" for a 1-CPU box: pattern maps evaluated once per request,
# no heavy module. Catches the noisy automated stuff (SQLi/XSS/traversal
# probes and known bad scanners) before it ever reaches Next.js. The app
# itself has no SQL database (CMS is JSON files), so SQLi can't actually hit
# anything here — these rules mostly cut log noise and bot load.
#
# Use the variables below inside the server block:
#   if ($bad_bot)         { return 403; }
#   if ($bad_request)     { return 403; }

# --- Known bad / aggressive scanners and scrapers -------------------------
map $http_user_agent $bad_bot {
    default 0;
    ""                                   1;   # no UA at all
    "~*(sqlmap|nikto|nmap|masscan|nessus|acunetix|nuclei|wpscan)" 1;
    "~*(fuzz|dirbuster|gobuster|feroxbuster|hydra)"               1;
    "~*(zgrab|censys|shodan|semrush|ahrefsbot|mj12bot|dotbot)"    1;
}

# --- Obvious attack patterns in the raw request URI -----------------------
# Matches SQLi keywords, XSS markers, path traversal and shell/dotfile probes.
map $request_uri $bad_request {
    default 0;
    "~*(\.\./|\.\.%2f|%2e%2e%2f)"                         1;   # traversal
    "~*(<script|%3cscript|onerror=|onload=|javascript:)"  1;   # XSS
    "~*(union(\s|%20|\+)+select|select.+from|insert(\s|%20)+into)" 1;  # SQLi
    "~*(/wp-admin|/wp-login|/xmlrpc\.php|/phpmyadmin|/\.env|/\.git)" 1;  # CMS/secret probes
    "~*(/etc/passwd|/bin/sh|cmd\.exe)"                    1;   # LFI/RCE probes
}
