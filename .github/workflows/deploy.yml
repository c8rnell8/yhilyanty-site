name: Deploy Site

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: 45.12.62.204
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /opt/yhilyanty-site
          git pull
          npm ci
          npm run build
          systemctl restart yhilyanty-site
